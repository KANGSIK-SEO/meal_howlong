<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밥상 수명예측기 🍚</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #2d3748;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #2d3748;
            background: #f7fafc;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .row { display: flex; gap: 12px; }
        .row .form-group { flex: 1; }

        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #f7fafc;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #667eea;
            background: #ebf4ff;
        }

        .upload-area .emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .upload-area p { color: #718096; font-size: 0.9rem; }
        .upload-area input[type="file"] { display: none; }

        #preview {
            display: none;
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .result {
            display: none;
            margin-top: 24px;
            padding: 24px;
            background: linear-gradient(135deg, #f6f9ff 0%, #f0f4ff 100%);
            border-radius: 16px;
            border-left: 4px solid #667eea;
        }

        .result-text {
            color: #2d3748;
            font-size: 0.95rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .result-text strong {
            color: #667eea;
            font-size: 1.2rem;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>🍚 밥상 수명예측기</h1>
        <p class="subtitle">오늘 드신 밥상 사진을 올리면<br>몇 살까지 살지 알려드립니다</p>

        <form id="mainForm">
            <div class="row">
                <div class="form-group">
                    <label for="age">나이 (선택)</label>
                    <input type="number" id="age" min="1" max="120" placeholder="예: 30">
                </div>
                <div class="form-group">
                    <label for="gender">성별 (선택)</label>
                    <select id="gender">
                        <option value="">선택 안 함</option>
                        <option value="male">남성</option>
                        <option value="female">여성</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>밥상 사진</label>
                <div class="upload-area" id="uploadArea">
                    <span class="emoji">📸</span>
                    <p>클릭하거나 사진을 여기에 드래그하세요</p>
                    <input type="file" id="imageInput" accept="image/*" required>
                </div>
                <img id="preview" alt="미리보기">
            </div>

            <button type="submit" class="btn" id="submitBtn">수명 예측하기</button>
        </form>

        <div class="result" id="resultBox">
            <div class="result-text" id="resultText"></div>
        </div>
    </div>

    <script>
        const COMMENTS = [
            ["채소가 풍부해서 혈관 건강에 좋아 보입니다.", "균형 잡힌 식단을 유지하고 있군요!"],
            ["탄수화물 위주의 식사네요. 단백질도 챙겨보세요.", "채소를 조금 더 추가해보는 건 어떨까요?"],
            ["단백질이 풍부한 식사입니다. 근육 건강에 좋습니다.", "물을 충분히 마시는 것도 잊지 마세요!"],
            ["기름진 음식이 보이네요. 가끔은 괜찮지만 자주는 삼가세요.", "운동과 함께라면 더욱 건강한 삶을 살 수 있어요!"],
            ["전통 한식 식단이군요. 발효 식품이 장 건강에 도움이 됩니다.", "이 식단이라면 장수할 가능성이 높습니다!"],
            ["과일과 채소가 가득하네요. 비타민 충전 완료!", "이렇게 드시면 피부도 좋아질 거예요!"],
        ];

        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const form = document.getElementById('mainForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('resultBox');
        const resultText = document.getElementById('resultText');

        uploadArea.addEventListener('click', () => imageInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const dt = new DataTransfer();
                dt.items.add(file);
                imageInput.files = dt.files;
                showPreview(file);
            }
        });

        imageInput.addEventListener('change', () => {
            if (imageInput.files[0]) showPreview(imageInput.files[0]);
        });

        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                uploadArea.querySelector('p').textContent = file.name;
            };
            reader.readAsDataURL(file);
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!imageInput.files[0]) {
                alert('사진을 업로드해주세요.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>분석 중...';
            resultBox.style.display = 'none';

            setTimeout(() => {
                const age = parseInt(document.getElementById('age').value) || null;
                const predicted = Math.floor(Math.random() * 51) + 100; // 100~150
                const [comment, advice] = COMMENTS[Math.floor(Math.random() * COMMENTS.length)];

                let ageMsg = '';
                if (age && age < predicted) {
                    ageMsg = ` (앞으로 ${predicted - age}년 더!)`;
                }

                const html =
                    `당신은 <strong>${predicted}살</strong>까지 살아있을 예정입니다! 🎉${ageMsg}\n\n${comment}\n\n💡 ${advice}`;

                resultText.innerHTML = html;
                resultBox.style.display = 'block';
                resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                submitBtn.disabled = false;
                submitBtn.innerHTML = '수명 예측하기';
            }, 1500);
        });
    </script>
</body>
</html>
